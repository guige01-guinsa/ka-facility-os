[pytest]
testpaths = tests
norecursedirs =
    .git
    .venv
    .pytest_cache
    .pytest_tmp
    .pytest_tmp_smoke
    tmp_pytest*
    __pycache__
markers =
    acceptance: end-to-end acceptance scenarios that lock cross-domain operator workflows
    smoke: deployment-critical smoke coverage for health, auth, core UI, inspection, and runbook paths
